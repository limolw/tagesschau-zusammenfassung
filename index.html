<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tagesschau KI-Ticker</title>
    <style>
        :root { --tagesschau-blau: #003082; --hellblau: #00aaff; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 20px; background-color: #f4f7f9; color: #333; }
        h1 { color: var(--tagesschau-blau); text-align: center; font-size: 2.5em; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 4px solid var(--tagesschau-blau); display: inline-block; width: 100%; padding-bottom: 10px; }
        .post { background: white; padding: 30px; margin-bottom: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 6px solid var(--hellblau); }
        .date { color: #888; font-weight: bold; font-size: 0.9em; margin-bottom: 5px; }
        .title { color: var(--tagesschau-blau); margin: 0 0 20px 0; font-size: 1.8em; line-height: 1.2; }
        .summary { font-size: 1.1em; line-height: 1.7; margin-bottom: 25px; color: #444; }
        .visuals-box { background: #f0f4f8; padding: 20px; border-radius: 10px; font-size: 0.95em; color: #555; }
        .visuals-label { font-weight: bold; color: var(--hellblau); display: block; margin-bottom: 10px; font-size: 0.8em; text-transform: uppercase; }
        /* Hier passiert die Magie für das Fettgedruckte */
        strong { color: var(--tagesschau-blau); }
    </style>
</head>
<body>
    <h1>Tagesschau Fokus 📺</h1>
    <div id="content">Lade neueste Analysen...</div>

    <script>
        function formatText(text) {
            if (!text) return "";
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Wandelt **Text** in Fettduck um
                .replace(/\n/g, '<br>'); // Zeilenumbrüche
        }

        fetch('data.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('content');
                container.innerHTML = '';
                data.slice().reverse().forEach(item => {
                    container.innerHTML += `
                        <div class="post">
                            <div class="date">${item.datum}</div>
                            <h2 class="title">${item.titel}</h2>
                            <div class="summary">${formatText(item.zusammenfassung)}</div>
                            <div class="visuals-box">
                                <span class="visuals-label">Visuelle Analyse</span>
                                ${formatText(item.visuell)}
                            </div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
