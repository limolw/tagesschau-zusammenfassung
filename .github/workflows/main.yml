name: Tagesschau Checker

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Ganz wichtig für das Speichern

    steps:
      - name: Lade Code herunter
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Hält die Verbindung zu GitHub offen

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installiere Werkzeuge
        run: pip install requests google-generativeai

      - name: Führe das Skript aus
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MEINE_EMAIL: ${{ secrets.MEINE_EMAIL }}
        run: python script.py

      - name: Speichere neue Zusammenfassung auf GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          # Falls keine Änderung da ist, wird kein Fehler geworfen
          git commit -m "Automatisches Update: Neue Zusammenfassung" || exit 0
          git push origin main
